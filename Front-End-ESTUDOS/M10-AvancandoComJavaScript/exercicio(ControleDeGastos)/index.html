<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Gastos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>Controle de Gastos</h1>
        <form>
            <input type="text" name="valorGasto" id="valorGasto" placeholder="Valor gasto">
            <select name="categoriaGasto" id="categoriaGasto">
                <option value="alimentacao">Alimentação</option>
                <option value="transporte">Transporte</option>
                <option value="lazer">Lazer</option>
                <option value="outros">Outros</option>
            </select>
            <button type="submit">Adicionar</button>
        </form>
        <div id="listaGastos">
            <label for="alimentacao" class="valor">Alimentação: R$<p>0,00</p></label>
            <label for="transporte" class="valor">Transporte: R$<p>0,00</p></label>
            <label for="lazer" class="valor">Lazer: R$<p>0,00</p></label>
            <label for="outros" class="valor">Outros: R$<p>0,00</p></label>
            <label for="total" class="valor">Total: R$<p>0,00</p></label>
            <button id="btnApagar">Apagar Tudo</button>
        </div>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
