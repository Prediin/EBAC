<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test HTTP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h1>SCC</h1>
        <h2>(Sistema de Cadastro de Clientes)</h2>

        <form id="cadastroClientes">
            <label for="nome">Nome do Cliente:</label>
            <input type="text" id="nome" placeholder="Nome do Cliente">

            <label for="email">Email de Contato:</label>
            <input type="email" id="email" placeholder="cliente@email.com">

            <button type="submit" id="btnAdicionar">Cadastrar</button>
            <button type="reset" id="btnLimpar">Limpar Tudo</button>
        </form>

        <h3>Clientes Cadastrados:</h3>
        <ul id="listaClientes">
            <li><img src="IMGS/cliente_perfil_icon.jpg" alt="">Cliente Teste <button id="btnDeletar">X</button></li>
            <li><img src="IMGS/cliente_perfil_icon.jpg" alt="">Cliente Teste <button id="btnDeletar">X</button></li>
        </ul>
    </main>

    <script src="script.js"></script>
</body>
</html>
